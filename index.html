<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Golf Passport</title>

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg-deep:    #050810;
  --bg-panel:   rgba(10,14,30,0.97);
  --bg-card:    rgba(255,255,255,0.03);
  --bg-hover:   rgba(255,255,255,0.05);
  --border:     rgba(255,255,255,0.06);
  --border-hi:  rgba(255,255,255,0.1);
  --accent:     #38bdf8;
  --accent-soft: rgba(56,189,248,0.1);
  --accent-glow: rgba(56,189,248,0.2);
  --green:      #34d399;
  --green-soft: rgba(52,211,153,0.1);
  --amber:      #fbbf24;
  --amber-soft: rgba(251,191,36,0.1);
  --rose:       #fb7185;
  --rose-soft:  rgba(251,113,133,0.1);
  --text-1:     #f1f5f9;
  --text-2:     #94a3b8;
  --text-3:     #475569;
  --radius-lg:  20px;
  --radius-md:  12px;
  --radius-sm:  8px;
  --shadow-panel: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);
  --shadow-elevated: 0 20px 60px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.05);
  --ease-spring: cubic-bezier(0.22, 1, 0.36, 1);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-tap-highlight-color: transparent; }
body { background: var(--bg-deep); overflow: hidden; font-family: var(--font); -webkit-font-smoothing: antialiased; }
#map { width: 100vw; height: 100vh; }

/* Darken map tiles for dark theme harmony */
.maplibregl-canvas-container canvas {
  filter: brightness(0.78) saturate(0.7) contrast(1.05);
}

/* Subtle vignette overlay */
#map::after {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(5,8,16,0.5) 100%);
  z-index: 1;
}

/* ── MapLibre overrides ── */
.maplibregl-ctrl-bottom-right,
.maplibregl-ctrl-bottom-left { display: none; }
.maplibregl-ctrl-top-right { margin-top: 12px; margin-right: 12px; }
.maplibregl-ctrl-group {
  background: var(--bg-panel) !important;
  border: 1px solid var(--border) !important;
  border-radius: var(--radius-sm) !important;
  box-shadow: var(--shadow-panel) !important;
  overflow: hidden;
}
.maplibregl-ctrl-group button {
  background: transparent !important;
  border-color: var(--border) !important;
  width: 36px !important; height: 36px !important;
}
.maplibregl-ctrl-group button + button { border-top: 1px solid var(--border) !important; }
.maplibregl-ctrl-group button .maplibregl-ctrl-icon { filter: invert(0.8); }

/* ── Counter pill ── */
#counter {
  position: fixed;
  bottom: max(20px, env(safe-area-inset-bottom, 20px));
  left: 50%; transform: translateX(-50%);
  background: var(--bg-panel);
  border: 1px solid var(--border-hi);
  backdrop-filter: blur(24px) saturate(1.4);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
  color: var(--text-2);
  padding: 12px 24px;
  border-radius: 50px;
  font-size: 0.78em; font-weight: 500; letter-spacing: 0.02em;
  z-index: 1000; cursor: grab; user-select: none;
  display: flex; align-items: center; gap: 16px;
  transition: border-color 0.25s, box-shadow 0.25s, transform 0.15s;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.03);
}
#counter:hover {
  border-color: rgba(56,189,248,0.3);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 30px rgba(56,189,248,0.08), inset 0 0 0 1px rgba(56,189,248,0.12);
}
#counter:active { transform: translateX(-50%) scale(0.97); }
#counter.dragging { cursor: grabbing; transform: none; }
#counter .sep { width: 1px; height: 16px; background: var(--border-hi); flex-shrink: 0; }
#counter .num { color: var(--text-1); font-weight: 800; font-variant-numeric: tabular-nums; }
#counter .cta {
  color: var(--accent); font-weight: 700;
  padding: 4px 12px; border-radius: 20px;
  background: var(--accent-soft);
  transition: background 0.15s;
}
#counter:hover .cta { background: var(--accent-glow); }

/* ── Legend ── */
#legend {
  position: fixed; top: 14px; right: 12px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  padding: 10px 14px; border-radius: var(--radius-md);
  font-size: 0.68em; z-index: 1000; line-height: 1;
  cursor: grab; user-select: none;
  box-shadow: var(--shadow-panel);
  transition: opacity 0.2s;
}
#legend.dragging { cursor: grabbing; }
.leg { display: flex; align-items: center; gap: 8px; margin: 5px 0; color: var(--text-2); font-weight: 500; }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.5); flex-shrink: 0; }

/* ── Home city modal ── */
#home-city-modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 5000;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.hc-box {
  background: var(--bg-panel);
  border: 1px solid var(--border-hi);
  border-radius: var(--radius-lg);
  padding: 32px;
  max-width: 380px; width: 90%;
  text-align: center;
  box-shadow: var(--shadow-elevated);
  animation: modalPop 0.3s var(--ease-spring);
}
@keyframes modalPop {
  from { opacity: 0; transform: scale(0.92) translateY(10px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.hc-box h2 {
  font-family: var(--font); font-size: 1.1em; font-weight: 800;
  color: var(--text-1); margin-bottom: 6px; letter-spacing: -0.01em;
}
.hc-box p {
  font-family: var(--font); font-size: 0.78em;
  color: var(--text-2); margin-bottom: 20px; line-height: 1.5;
}
.hc-box input {
  width: 100%; padding: 12px 16px; border-radius: var(--radius-sm);
  border: 1px solid var(--border-hi); background: rgba(255,255,255,0.05);
  color: var(--text-1); font-family: var(--font); font-size: 0.88em; font-weight: 500;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s;
}
.hc-box input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(56,189,248,0.12);
}
.hc-box input::placeholder { color: var(--text-3); }
.hc-box button#hc-go {
  margin-top: 14px; padding: 11px 32px; border: none; border-radius: var(--radius-sm);
  background: var(--accent); color: #0a0e1a; font-family: var(--font);
  font-size: 0.82em; font-weight: 800; cursor: pointer; letter-spacing: 0.01em;
  transition: opacity 0.15s, transform 0.1s;
}
.hc-box button#hc-go:hover { opacity: 0.88; }
.hc-box button#hc-go:active { transform: scale(0.97); }
.hc-box .hc-skip {
  display: block; margin-top: 12px; font-size: 0.72em;
  color: var(--text-3); cursor: pointer; background: none; border: none;
  font-family: var(--font); font-weight: 500;
  transition: color 0.15s;
}
.hc-box .hc-skip:hover { color: var(--text-2); }

/* ── Shared panel styles ── */
.panel-close {
  background: rgba(255,255,255,0.06); border: none; color: var(--text-3); cursor: pointer;
  font-size: 0.82em; padding: 6px 8px; line-height: 1; border-radius: var(--radius-sm);
  transition: color 0.15s, background 0.15s;
  flex-shrink: 0;
}
.panel-close:hover { color: var(--text-1); background: rgba(255,255,255,0.1); }

/* ── Course popup ── */
#popup {
  position: fixed; top: 20px; right: 20px;
  width: 320px; max-height: calc(100vh - 40px);
  background: var(--bg-panel);
  border: 1px solid var(--border-hi);
  backdrop-filter: blur(24px) saturate(1.4);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
  border-radius: var(--radius-lg); color: var(--text-1); z-index: 2000;
  display: none; flex-direction: column;
  box-shadow: var(--shadow-elevated);
  overflow: hidden;
  animation: slideRight 0.25s var(--ease-spring);
}
@keyframes slideRight {
  from { opacity: 0; transform: translateX(16px); }
  to   { opacity: 1; transform: translateX(0); }
}
.ph {
  padding: 18px 18px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;
  flex-shrink: 0;
}
.ph-name { font-size: 0.9em; font-weight: 800; color: var(--text-1); line-height: 1.35; word-break: break-word; }
.ph-meta { font-size: 0.72em; color: var(--text-3); margin-top: 5px; font-weight: 500; }
.ph-avg  { font-weight: 800; }
.pr { overflow-y: auto; flex: 1; overscroll-behavior: contain; }
.pr::-webkit-scrollbar { width: 3px; }
.pr::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.rr {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 18px; border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: background 0.12s;
}
.rr:last-child { border-bottom: none; }
.rr:hover { background: var(--bg-hover); }
.rd { font-size: 0.75em; color: var(--text-3); font-weight: 500; }
.rs { font-size: 1.1em; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
.sg { color: var(--green); }
.sy { color: var(--amber); }
.sr { color: var(--rose); }
.sn { color: var(--text-3); font-style: italic; }

/* ── Passport panel ── */
#passport {
  position: fixed; top: 20px; left: 20px;
  width: 320px; max-height: calc(100vh - 40px);
  background: var(--bg-panel);
  border: 1px solid var(--border-hi);
  backdrop-filter: blur(24px) saturate(1.4);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
  border-radius: var(--radius-lg); color: var(--text-1); z-index: 2001;
  display: none; flex-direction: column;
  box-shadow: var(--shadow-elevated);
  overflow: hidden;
  animation: slideLeft 0.25s var(--ease-spring);
}
@keyframes slideLeft {
  from { opacity: 0; transform: translateX(-16px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* Accent gradient line at top */
#passport::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--green) 50%, var(--accent));
  opacity: 0.6;
  z-index: 1;
}

.pp-header {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: flex-start;
  flex-shrink: 0;
  background: linear-gradient(180deg, rgba(56,189,248,0.04) 0%, transparent 100%);
}
.pp-brand { display: flex; flex-direction: column; gap: 1px; }
.pp-title {
  font-size: 0.62em; font-weight: 800; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--accent);
}
.pp-name {
  font-size: 1.2em; font-weight: 900; color: var(--text-1);
  margin-top: 3px; letter-spacing: -0.02em;
}
.pp-years {
  font-size: 0.68em; font-weight: 500; color: var(--text-3);
  letter-spacing: 0.06em; margin-top: 2px;
}

/* Home city row */
.pp-home {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  flex-shrink: 0;
}
.pp-home:hover { background: var(--bg-hover); }
.pp-home:active { background: rgba(255,255,255,0.07); }
.pp-home-icon { flex-shrink: 0; color: var(--accent); display: flex; }
.pp-home-text { flex: 1; min-width: 0; }
.pp-home-label {
  font-size: 0.55em; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text-3); line-height: 1;
}
.pp-home-city {
  font-size: 0.82em; font-weight: 600; color: var(--text-2);
  margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.pp-home-city.not-set { color: var(--text-3); font-style: italic; }
.pp-home-action {
  font-size: 0.65em; font-weight: 700; color: var(--accent);
  flex-shrink: 0; letter-spacing: 0.02em;
}

.pp-body { overflow-y: auto; flex: 1; overscroll-behavior: contain; }
.pp-body::-webkit-scrollbar { width: 3px; }
.pp-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* stat grid */
.stat-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1px; background: var(--border);
  border-bottom: 1px solid var(--border);
}
.stat-cell {
  background: var(--bg-panel);
  padding: 16px 18px;
}
.stat-num {
  font-size: 2.2em; font-weight: 900; font-variant-numeric: tabular-nums;
  color: var(--text-1); line-height: 1; letter-spacing: -0.03em;
}
.stat-label {
  font-size: 0.58em; font-weight: 700; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px;
}

/* detail rows */
.pp-details { padding: 4px 0; border-bottom: 1px solid var(--border); }
.pp-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 18px;
}
.pp-row-label { font-size: 0.68em; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; }
.pp-row-right { text-align: right; }
.pp-row-val { font-size: 0.95em; font-weight: 800; color: var(--text-1); font-variant-numeric: tabular-nums; }
.pp-row-sub { font-size: 0.62em; font-weight: 500; color: var(--text-3); margin-top: 1px; }

/* best round highlight */
.pp-best {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
}
.pp-best-score {
  font-size: 2.6em; font-weight: 900; line-height: 1;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
}
.pp-best-info { flex: 1; }
.pp-best-label { font-size: 0.58em; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.1em; }
.pp-best-course { font-size: 0.78em; font-weight: 600; color: var(--text-2); margin-top: 3px; }
.pp-best-date { font-size: 0.65em; font-weight: 500; color: var(--text-3); margin-top: 1px; }

/* sections */
.pp-section-header {
  font-size: 0.58em; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text-3);
  padding: 14px 18px 8px;
}
.pp-badge-row {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 0 18px 16px;
}

.badge {
  font-size: 0.65em; font-weight: 700; letter-spacing: 0.04em;
  padding: 5px 10px; border-radius: var(--radius-sm);
  border: 1px solid; cursor: pointer;
  transition: all 0.15s ease;
}
.badge:hover { transform: translateY(-1px); }
.badge:active { transform: scale(0.96); }
.badge-us {
  background: var(--accent-soft); color: var(--accent);
  border-color: rgba(56,189,248,0.15);
}
.badge-us:hover, .badge-us.active {
  background: var(--accent-glow); border-color: rgba(56,189,248,0.4);
  box-shadow: 0 2px 12px rgba(56,189,248,0.1);
}
.badge-intl {
  background: var(--amber-soft); color: var(--amber);
  border-color: rgba(251,191,36,0.15);
}
.badge-intl:hover, .badge-intl.active {
  background: rgba(251,191,36,0.18); border-color: rgba(251,191,36,0.4);
  box-shadow: 0 2px 12px rgba(251,191,36,0.08);
}

/* region course list (inside popup) */
.region-course {
  padding: 12px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  transition: background 0.12s;
}
.region-course:last-child { border-bottom: none; }
.region-course:hover { background: var(--bg-hover); }
.rc-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.rc-name { font-size: 0.8em; font-weight: 700; color: var(--text-1); line-height: 1.3; }
.rc-avg { font-size: 0.92em; font-weight: 900; font-variant-numeric: tabular-nums; flex-shrink: 0; }
.rc-meta { font-size: 0.66em; font-weight: 500; color: var(--text-3); margin-top: 3px; }
.rc-scores { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.rc-score {
  font-size: 0.62em; font-weight: 700; padding: 3px 6px;
  border-radius: 5px; background: rgba(255,255,255,0.04);
  font-variant-numeric: tabular-nums;
}

/* top 100 section */
.t100-count {
  color: var(--accent); font-weight: 900;
  font-size: 1.1em; font-variant-numeric: tabular-nums;
}
.t100-entry {
  padding: 12px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer; transition: background 0.12s;
}
.t100-entry:last-child { border-bottom: none; }
.t100-entry:hover { background: var(--bg-hover); }
.t100-top { display: flex; align-items: center; gap: 10px; }
.t100-rank {
  font-size: 0.7em; font-weight: 900;
  min-width: 28px; text-align: center;
  padding: 3px 5px; border-radius: 6px;
  font-variant-numeric: tabular-nums;
  flex-shrink: 0; line-height: 1;
}
.t100-elite {
  background: rgba(251,191,36,0.12); color: var(--amber);
  border: 1px solid rgba(251,191,36,0.25);
}
.t100-ranked {
  background: var(--accent-soft); color: var(--accent);
  border: 1px solid rgba(56,189,248,0.18);
}
.t100-info { flex: 1; min-width: 0; }
.t100-name { font-size: 0.78em; font-weight: 700; color: var(--text-1); line-height: 1.3; }
.t100-list { font-size: 0.56em; font-weight: 600; color: var(--text-3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }
.t100-scores { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; padding-left: 38px; }

/* ── Course markers ── */
.cmarker {
  width: 16px; height: 16px; border-radius: 50%;
  border: 2.5px solid rgba(255,255,255,0.9);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.3), 0 2px 10px rgba(0,0,0,0.5);
  cursor: pointer;
  transition: transform 0.15s var(--ease-spring), box-shadow 0.15s;
}
.cmarker:hover {
  transform: scale(1.7);
  box-shadow: 0 0 0 2px rgba(255,255,255,0.7), 0 0 20px currentColor, 0 4px 16px rgba(0,0,0,0.5);
  z-index: 10 !important;
}

/* ── Mobile responsive ── */
@media (max-width: 680px) {
  /* Map vignette: less intense on mobile */
  #map::after {
    background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(5,8,16,0.45) 100%);
  }

  /* Counter becomes fixed bottom bar */
  #counter {
    bottom: max(12px, env(safe-area-inset-bottom, 12px));
    padding: 11px 20px;
    font-size: 0.74em;
    gap: 12px;
    max-width: calc(100vw - 24px);
  }

  /* Legend: smaller, top-left on mobile */
  #legend {
    top: 10px; right: auto; left: 10px;
    padding: 8px 12px;
    font-size: 0.62em;
    border-radius: var(--radius-sm);
  }

  /* Panels become bottom sheets */
  #passport, #popup {
    top: auto !important; left: 0 !important; right: 0 !important;
    bottom: 0 !important;
    width: 100% !important;
    max-height: 88vh;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
  }
  #passport { animation: slideUp 0.3s var(--ease-spring); }
  #popup    { animation: slideUp 0.3s var(--ease-spring); }
  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0.5; }
    to   { transform: translateY(0); opacity: 1; }
  }

  /* Sheet drag handle (CSS pseudo) */
  #passport::before, #popup::before {
    content: '';
    display: block;
    width: 36px; height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.2);
    margin: 10px auto 2px;
    flex-shrink: 0;
  }
  /* Move the accent line below the handle on mobile */
  #passport::after { top: 18px; }

  .pp-header { padding: 10px 18px 14px; }
  .ph { padding: 14px 18px 12px; }
  .stat-cell { padding: 14px 16px; }
  .stat-num { font-size: 1.9em; }

  /* Larger touch targets */
  .badge { padding: 7px 12px; font-size: 0.68em; }
  .pp-home { padding: 14px 18px; }
  .region-course { padding: 14px 18px; }
  .t100-entry { padding: 14px 18px; }
  .rr { padding: 12px 18px; }
  .cmarker { width: 18px; height: 18px; }

  /* Home city modal fullscreen-ish on mobile */

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<script>
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(s) { const p = s.split('/'); return `${MONTHS[+p[0]-1]} ${p[2]||p[1]}`; }
function fmtYear(s) { const p = s.split('/'); return +(p[2]||p[1]); }
function pinColor(avg) { return avg < 80 ? '#34d399' : avg < 90 ? '#fbbf24' : '#fb7185'; }
function scoreClass(s) { return s == null ? 'sn' : s < 80 ? 'sg' : s < 90 ? 'sy' : 'sr'; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Region inference from lat/lon ─────────────────────────────────────────────
function inferRegion(lat, lon) {
  if (lon < -5.5 && lat > 54)                          return { country: 'N. Ireland', state: null };
  if (lon < -5.5 && lat > 49)                          return { country: 'Ireland',    state: null };
  if (lat > 54)                                        return { country: 'Scotland',   state: null };
  if (lat > 49)                                        return { country: 'England',    state: null };
  if (lat < 23 && lon < -150)                          return { country: 'USA', state: 'HI' };
  if (lon < -115)                                      return { country: 'USA', state: 'CA' };
  if (lon < -109 && lat < 37)                          return { country: 'USA', state: 'AZ' };
  if (lat < 28)                                        return { country: 'USA', state: 'FL' };
  if (lat < 33.5 && lon < -78)                         return { country: 'USA', state: 'SC' };
  if (lat < 37 && lon > -84)                           return { country: 'USA', state: 'NC' };
  if (lat < 39.5 && lon > -75.8 && lon < -74.8)       return { country: 'USA', state: 'DE' };
  if (lat > 40 && lon > -74.15)                        return { country: 'USA', state: 'NY' };
  if (lat > 41.3 && lon > -75.2)                       return { country: 'USA', state: 'NY' };
  if (lon > -74.97)                                    return { country: 'USA', state: 'NJ' };
  return { country: 'USA', state: 'PA' };
}

const STATE_LABELS = {
  PA:'Pennsylvania', NJ:'New Jersey', NY:'New York', DE:'Delaware',
  NC:'N. Carolina', SC:'S. Carolina', FL:'Florida',
  CA:'California', HI:'Hawaii', AZ:'Arizona'
};
const STATE_ORDER = ['PA','DE','NJ','NY','NC','SC','FL','AZ','CA','HI'];

// ── Top 100 course lists (from top100golfcourses.com) ─────────────────────────
const TOP_100 = [

  [21,"GBI","Royal Porthcawl"],[22,"GBI","Cruden Bay"],[23,"GBI","Ganton"],[24,"GBI","Portmarnock"],[25,"GBI","Trump International (Aberdeen)"],[26,"GBI","Royal Birkdale"],[27,"GBI","St George's Hill"],[28,"GBI","Royal Aberdeen"],[29,"GBI","Royal Cinque Ports"],[30,"GBI","Prestwick"],

  [51,"GBI","Formby"],[52,"GBI","Saunton (East)"],[53,"GBI","Nairn (Championship)"],[54,"GBI","Wentworth (West)"],[55,"GBI","Hankley Common"],[56,"GBI","County Sligo"],[57,"GBI","Trump International (Doonbeg)"],[58,"GBI","Machrie"],[59,"GBI","Adare Manor"],[60,"GBI","Gullane No.1"],
  [61,"GBI","Burnham & Berrow"],[62,"GBI","Carne (Wild Atlantic Dunes)"],[63,"GBI","Ballyliffin (Glashedy)"],[64,"GBI","Rosapenna (Sandy Hills)"],[65,"GBI","Woking"],[66,"GBI","Tralee"],[67,"GBI","Queenwood"],[68,"GBI","Hunstanton"],[69,"GBI","Enniscrone (Dunes)"],[70,"GBI","Liphook"],
  [71,"GBI","Worplesdon"],[72,"GBI","Skibo Castle (Carnegie Links)"],[73,"GBI","Renaissance Club"],[74,"GBI","Old Head"],[75,"GBI","Portstewart (Strand)"],[76,"GBI","West Hill"],[77,"GBI","Narin & Portnoo"],[78,"GBI","Pennard"],[79,"GBI","Gleneagles (Queen's)"],[80,"GBI","Royal St David's"],
  [81,"GBI","Machrihanish Dunes"],[82,"GBI","Parkstone"],[83,"GBI","Berkshire (Blue)"],[84,"GBI","Aberdovey"],[85,"GBI","West Lancashire"],[86,"GBI","Prince's"],[87,"GBI","The Addington"],[88,"GBI","Broadstone"],[89,"GBI","JCB Golf & Country Club"],[90,"GBI","Hindhead"],
  [91,"GBI","Walton Heath (New)"],[92,"GBI","Castletown"],[93,"GBI","Delamere Forest"],[94,"GBI","Southport & Ainsdale"],[95,"GBI","Moortown"],[96,"GBI","Wallasey"],[97,"GBI","Royal Dublin"],[98,"GBI","Brora"],[99,"GBI","St Andrews (New)"],
  [1,"US","Cypress Point Club"],[2,"US","Pine Valley Golf Club"],[3,"US","Shinnecock Hills Golf Club"],[4,"US","National Golf Links of America"],[5,"US","Oakmont Country Club"],[6,"US","Sand Hills Golf Club"],[7,"US","Merion Golf Club (East)"],[8,"US","Augusta National Golf Club"],[9,"US","Los Angeles Country Club (North)"],[10,"US","Fishers Island Club"],
  [11,"US","Friar's Head"],[12,"US","Chicago Golf Club"],[13,"US","Pacific Dunes"],[14,"US","Pebble Beach Golf Links"],[15,"US","Prairie Dunes Country Club"],[16,"US","Riviera Country Club"],[17,"US","Crystal Downs Country Club"],[18,"US","Winged Foot Golf Club (West)"],[19,"US","California Golf Club of San Francisco"],[20,"US","Old Town Club"],
  [21,"US","San Francisco Golf Club"],[22,"US","Somerset Hills Country Club"],[23,"US","Oakland Hills Country Club (South)"],[24,"US","Camargo Club"],[25,"US","Shoreacres"],[26,"US","CapRock Ranch"],[27,"US","Seminole Golf Club"],[28,"US","Bethpage Black"],[29,"US","Pinehurst No. 2"],[30,"US","Oak Hill Country Club (East)"],
  [31,"US","The Lido (Sand Valley)"],[32,"US","Maidstone Club"],[33,"US","Sleepy Hollow Country Club (Upper)"],[34,"US","Myopia Hunt Club"],[35,"US","Eastward Ho!"],[36,"US","Garden City Golf Club"],[37,"US","Ballyneal Golf Club"],[38,"US","Bandon Trails"],[39,"US","Bandon Dunes"],[40,"US","Inverness Club"],
  [41,"US","Rock Creek Cattle Company"],[42,"US","Whistling Straits (Straits)"],[43,"US","Peachtree"],[44,"US","Baltusrol Golf Club (Lower)"],[45,"US","Kiawah Island (Ocean)"],[46,"US","The Country Club (Clyde & Squirrel)"],[47,"US","Old Barnwell"],[48,"US","Old Sandwich Golf Club"],[49,"US","Essex County Club"],[50,"US","Winged Foot Golf Club (East)"],
  [51,"US","Yeamans Hall Club"],[52,"US","Wade Hampton Golf Club"],[53,"US","Southern Hills Country Club"],[54,"US","Ohoopee Match Club"],[55,"US","The Golf Club"],[56,"US","Quaker Ridge Golf Club"],[57,"US","Piping Rock Club"],[58,"US","Gozzer Ranch Golf & Lake Club"],[59,"US","Shadow Creek"],[60,"US","Scioto Country Club"],
  [61,"US","Muirfield Village Golf Club"],[62,"US","Plainfield Country Club"],[63,"US","Pasatiempo Golf Club"],[64,"US","White Bear Yacht Club"],[65,"US","Monterey Peninsula (Dunes)"],[66,"US","TPC Sawgrass (Stadium)"],[67,"US","Valley Club of Montecito"],[68,"US","Kittansett Club"],[69,"US","Boston Golf Club"],[70,"US","Baltimore Country Club (East)"],
  [71,"US","Milwaukee Country Club"],[72,"US","Lawsonia (Links)"],[73,"US","Olympic Club (Lake)"],[74,"US","Nanea Golf Club"],[75,"US","Sand Valley"],[76,"US","Victoria National Golf Club"],[77,"US","Congaree Golf Club"],[78,"US","The Creek"],[79,"US","Calusa Pines Golf Club"],[80,"US","St Louis Country Club"],
  [81,"US","Ridgewood Country Club (East & West)"],[82,"US","Bel-Air Country Club"],[83,"US","Ladera Golf Club"],[84,"US","The Honors Course"],[85,"US","Colorado Golf Club"],[86,"US","Kingsley Club"],[87,"US","Pikewood National Golf Club"],[88,"US","The Tree Farm"],[89,"US","Lake Merced Golf Club"],[90,"US","Old Elm Club"],
  [91,"US","Congressional Country Club (Blue)"],[92,"US","Scottsdale National (Other Course)"],[93,"US","Moraine Country Club"],[94,"US","Lost Rail Golf Club"],[95,"US","Streamsong Red"],[96,"US","Chambers Bay"],[97,"US","Fox Chapel Golf Club"],[98,"US","Sedge Valley"],[99,"US","Medinah Country Club (No. 3)"],[100,"US","Old Macdonald"]
];

function normName(s) {
  return s.toLowerCase()
    .replace(/[()]/g, '').replace(/[-]/g, ' ')
    .replace(/\bgolf\s*(club|course|links|resort)?\b/g, '')
    .replace(/\bcountry\s*club\b/g, '')
    .replace(/\bstate\s*park\b/g, '')
    .replace(/\bresort\b/g, '')
    .replace(/[,&|]/g, ' ')
    .replace(/\s+/g, ' ').trim();
}
function matchScore(a, b) {
  if (a === b) return 1;
  if (a.length < 4 || b.length < 4) return 0;
  if (a.includes(b) || b.includes(a)) {
    const ratio = Math.min(a.length, b.length) / Math.max(a.length, b.length);
    if (ratio > 0.75) return 0.95;
  }
  const aw = a.split(' ').filter(w => w.length > 2);
  const bw = b.split(' ').filter(w => w.length > 2);
  let hits = 0;
  for (const w of aw) { if (bw.includes(w)) hits++; }
  return aw.length > 0 ? hits / aw.length : 0;
}

// ── Aggregate by course ───────────────────────────────────────────────────────
const raw = window.GOLF_DATA || [];
const byCoord = {};
raw.forEach(r => {
  if (r.course_name === 'Other' || r.lat === null) return;
  const key = `${r.lat},${r.lon}`;
  if (!byCoord[key]) byCoord[key] = { name: r.course_name, lat: r.lat, lng: r.lon, rounds: [] };
  byCoord[key].rounds.push({ date: r.date, score: r.score, course: r.course_name });
});

const locations = Object.values(byCoord).map(d => {
  d.rounds.sort((a,b) => {
    const pa = a.date.split('/'), pb = b.date.split('/');
    const ya = +(pa[2]||pa[1]), yb = +(pb[2]||pb[1]);
    return ya !== yb ? yb-ya : +pb[0]-+pa[0];
  });
  const scored = d.rounds.filter(r => r.score != null);
  d.avg = scored.length > 0 ? scored.reduce((s,r) => s+r.score, 0) / scored.length : null;
  d.color = d.avg != null ? pinColor(d.avg) : '#94a3b8';
  return d;
});

const validRounds = raw.filter(r => r.course_name !== 'Other' && r.lat !== null);
document.getElementById('n-rounds').textContent  = validRounds.length;
document.getElementById('n-courses').textContent = locations.length;

// ── Tag each location with its region ─────────────────────────────────────────
const stateSet   = new Set();
const countrySet = new Set();
locations.forEach(d => {
  const reg = inferRegion(d.lat, d.lng);
  d.region = reg;
  if (reg.state) stateSet.add(reg.state);
  countrySet.add(reg.country);
});

const scoredRounds = validRounds.filter(r => r.score != null);
const bestRound  = scoredRounds.reduce((b, r) => r.score < b.score ? r : b);
const avgScore   = (scoredRounds.reduce((s,r) => s+r.score, 0) / scoredRounds.length).toFixed(1);
const mostPlayed = locations.reduce((a,b) => a.rounds.length > b.rounds.length ? a : b);
const allYears   = validRounds.map(r => fmtYear(r.date));
const firstYear  = Math.min(...allYears);
const lastYear   = Math.max(...allYears);

// ── Home city display ─────────────────────────────────────────────────────────
function updateHomeCityDisplay() {
  const cityEl = document.getElementById('pp-home-city');
  const actionEl = document.getElementById('pp-home-action');
  if (!cityEl) return;
  const saved = localStorage.getItem('golf_home_city');
  if (saved && saved !== '__skipped__') {
    cityEl.textContent = saved;
    cityEl.classList.remove('not-set');
    actionEl.textContent = 'Change';
  } else {
    cityEl.textContent = 'Not set';
    cityEl.classList.add('not-set');
    actionEl.textContent = 'Set';
  }
}

// ── Home city modal (set up listeners once) ───────────────────────────────────
const hcModal = document.getElementById('home-city-modal');
const hcInput = document.getElementById('hc-input');
let hcIsEdit = false;

function openHomeCityModal(edit) {
  hcIsEdit = !!edit;
  const h2 = hcModal.querySelector('h2');
  const p = hcModal.querySelector('p');
  const skip = document.getElementById('hc-skip');

  if (hcIsEdit) {
    h2.textContent = 'Change Home Base';
    p.textContent = 'Enter a city to recenter the map';
    skip.textContent = 'Cancel';
    const saved = localStorage.getItem('golf_home_city');
    hcInput.value = (saved && saved !== '__skipped__') ? saved : '';
  } else {
    h2.textContent = 'Welcome to Golf Passport';
    p.textContent = 'Enter your home city to center the map';
    skip.textContent = 'Skip';
    hcInput.value = '';
  }

  hcModal.style.display = 'flex';
  setTimeout(() => hcInput.focus(), 120);
}

function submitHomeCity() {
  const val = hcInput.value.trim();
  hcModal.style.display = 'none';
  if (val) {
    geocodeAndFly(val);
    setTimeout(updateHomeCityDisplay, 400);
  } else if (!hcIsEdit) {
    flyToDefault();
  }
}

document.getElementById('hc-go').addEventListener('click', submitHomeCity);
hcInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitHomeCity(); });
document.getElementById('hc-skip').addEventListener('click', () => {
  hcModal.style.display = 'none';
  if (!hcIsEdit) {
    localStorage.setItem('golf_home_city', '__skipped__');
    flyToDefault();
  }
});

// Home city row in passport — tap to edit
document.getElementById('pp-home-section').addEventListener('click', () => {
  openHomeCityModal(true);
});

function buildPassport() {
  document.getElementById('pp-rounds').textContent    = validRounds.length;
  document.getElementById('pp-courses').textContent   = locations.length;
  document.getElementById('pp-states').textContent    = stateSet.size;
  document.getElementById('pp-countries').textContent = countrySet.size;
  document.getElementById('pp-years').textContent     = `${firstYear} \u2013 ${lastYear}`;

  updateHomeCityDisplay();

  // Best round highlight
  const bestColor = bestRound.score < 80 ? 'var(--green)' : bestRound.score < 90 ? 'var(--amber)' : 'var(--rose)';
  document.getElementById('pp-best').innerHTML = `
    <div class="pp-best-score" style="color:${bestColor}">${bestRound.score}</div>
    <div class="pp-best-info">
      <div class="pp-best-label">Best Round</div>
      <div class="pp-best-course">${esc(bestRound.course_name)}</div>
      <div class="pp-best-date">${fmtDate(bestRound.date)}</div>
    </div>`;

  // Detail rows
  document.getElementById('pp-details').innerHTML = `
    <div class="pp-row">
      <span class="pp-row-label">Scoring Avg</span>
      <div class="pp-row-right">
        <div class="pp-row-val">${avgScore}</div>
      </div>
    </div>
    <div class="pp-row">
      <span class="pp-row-label">Most Played</span>
      <div class="pp-row-right">
        <div class="pp-row-val">${mostPlayed.rounds.length} rounds</div>
        <div class="pp-row-sub">${esc(mostPlayed.name)}</div>
      </div>
    </div>`;

  // Top 100 matching
  const top100Matches = [];
  locations.forEach(loc => {
    const isUSA = loc.region.country === 'USA';
    const isGBI = ['Scotland','England','Ireland','N. Ireland'].includes(loc.region.country);
    if (!isUSA && !isGBI) return;
    const listFilter = isUSA ? 'US' : 'GBI';
    const nameVariants = new Set([loc.name, ...loc.rounds.map(r => r.course)]);
    const normVariants = [...nameVariants].map(n => normName(n));
    for (const entry of TOP_100) {
      if (entry[1] !== listFilter) continue;
      const normTop = normName(entry[2]);
      const best = Math.max(...normVariants.map(nv => matchScore(normTop, nv)));
      if (best >= 0.7) {
        top100Matches.push({ rank: entry[0], list: entry[1], t100Name: entry[2], loc });
        break;
      }
    }
  });
  top100Matches.sort((a,b) => {
    if (a.list !== b.list) return a.list === 'US' ? -1 : 1;
    return a.rank - b.rank;
  });

  const t100Section = document.getElementById('pp-top100-section');
  if (top100Matches.length > 0) {
    t100Section.style.display = 'block';
    document.getElementById('pp-top100-count').textContent = top100Matches.length;
    document.getElementById('pp-top100').innerHTML = top100Matches.map((m, i) => {
      const d = m.loc;
      const rankClass = m.rank <= 10 ? 't100-elite' : 't100-ranked';
      const listLabel = m.list === 'US' ? 'United States Top 100' : 'Great Britain & Ireland Top 100';
      return `<div class="t100-entry" data-t100-idx="${i}">
        <div class="t100-top">
          <span class="t100-rank ${rankClass}">#${m.rank}</span>
          <div class="t100-info">
            <div class="t100-name">${esc(m.t100Name)}</div>
            <div class="t100-list">${listLabel}</div>
          </div>
        </div>
        <div class="t100-scores">${d.rounds.map(r =>
          `<span class="rc-score ${scoreClass(r.score)}">${r.score != null ? r.score : 'NR'}</span>`
        ).join('')}</div>
      </div>`;
    }).join('');

    document.getElementById('pp-top100').querySelectorAll('.t100-entry').forEach(row => {
      row.addEventListener('click', () => {
        showPopup(top100Matches[+row.dataset.t100Idx].loc);
      });
    });
  }

  // State badges
  const orderedStates = STATE_ORDER.filter(s => stateSet.has(s));
  const extraStates   = [...stateSet].filter(s => !STATE_ORDER.includes(s)).sort();
  const stBadgeEl = document.getElementById('pp-state-badges');
  stBadgeEl.innerHTML =
    [...orderedStates, ...extraStates].map(s =>
      `<span class="badge badge-us" data-region-type="state" data-region-key="${s}" title="${STATE_LABELS[s] || s}">${s}</span>`
    ).join('');
  stBadgeEl.querySelectorAll('.badge').forEach(b =>
    b.addEventListener('click', () => showRegionPopup('state', b.dataset.regionKey))
  );

  // Country badges
  const countryOrder = ['USA', 'England', 'Scotland', 'Ireland', 'N. Ireland'];
  const orderedCountries = countryOrder.filter(c => countrySet.has(c));
  const extraCountries   = [...countrySet].filter(c => !countryOrder.includes(c)).sort();
  const ctBadgeEl = document.getElementById('pp-country-badges');
  ctBadgeEl.innerHTML =
    [...orderedCountries, ...extraCountries].map(c =>
      `<span class="badge ${c === 'USA' ? 'badge-us' : 'badge-intl'}" data-region-type="country" data-region-key="${c}">${c}</span>`
    ).join('');
  ctBadgeEl.querySelectorAll('.badge').forEach(b =>
    b.addEventListener('click', () => showRegionPopup('country', b.dataset.regionKey))
  );
}

// ── Passport toggle ───────────────────────────────────────────────────────────
let passportBuilt = false;
document.getElementById('pp-close').addEventListener('click', () => {
  document.getElementById('passport').style.display = 'none';
});

// ── Region popup (state / country drill-down) ────────────────────────────────
function showRegionPopup(type, key) {
  const el = document.getElementById('popup');
  const filtered = locations.filter(d =>
    type === 'state' ? d.region.state === key : d.region.country === key
  ).sort((a,b) => b.rounds.length - a.rounds.length);

  const label = type === 'state' ? (STATE_LABELS[key] || key) : key;
  const totalRounds = filtered.reduce((s,d) => s + d.rounds.length, 0);

  el.innerHTML = `
    <div class="ph">
      <div style="min-width:0">
        <div class="ph-name">${esc(label)}</div>
        <div class="ph-meta">${filtered.length} course${filtered.length!==1?'s':''} &nbsp;\u00b7&nbsp; ${totalRounds} round${totalRounds!==1?'s':''}</div>
      </div>
      <button class="panel-close" id="btn-close">&#x2715;</button>
    </div>
    <div class="pr">
      ${filtered.map((d, i) => {
        const avgColor = d.avg != null ? (d.avg < 80 ? 'var(--green)' : d.avg < 90 ? 'var(--amber)' : 'var(--rose)') : 'var(--text-3)';
        return `<div class="region-course" data-loc-idx="${i}">
          <div class="rc-top">
            <span class="rc-name">${esc(d.name)}</span>
            <span class="rc-avg" style="color:${avgColor}">${d.avg != null ? d.avg.toFixed(1) : 'NR'}</span>
          </div>
          <div class="rc-meta">${d.rounds.length} round${d.rounds.length!==1?'s':''}</div>
          <div class="rc-scores">${d.rounds.map(r =>
            `<span class="rc-score ${scoreClass(r.score)}">${r.score != null ? r.score : 'NR'}</span>`
          ).join('')}</div>
        </div>`;
      }).join('')}
    </div>`;

  el.style.display = 'flex';
  document.getElementById('btn-close').onclick = () => el.style.display = 'none';

  el.querySelectorAll('.region-course').forEach(row => {
    row.addEventListener('click', () => {
      const idx = +row.dataset.locIdx;
      showPopup(filtered[idx]);
    });
  });
}

// ── Course popup ──────────────────────────────────────────────────────────────
function showPopup(d) {
  const el = document.getElementById('popup');
  const dot = `<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${d.color};margin-right:7px;vertical-align:middle;box-shadow:0 0 6px ${d.color}"></span>`;
  el.innerHTML = `
    <div class="ph">
      <div style="min-width:0">
        <div class="ph-name">${dot}${esc(d.name)}</div>
        <div class="ph-meta">${d.rounds.length} round${d.rounds.length!==1?'s':''} &nbsp;\u00b7&nbsp; <span class="ph-avg" style="color:${d.color}">${d.avg != null ? 'Avg ' + d.avg.toFixed(1) : 'No scores'}</span></div>
      </div>
      <button class="panel-close" id="btn-close">&#x2715;</button>
    </div>
    <div class="pr">${d.rounds.map(r=>`
      <div class="rr">
        <span class="rd">${fmtDate(r.date)}${r.course !== d.name ? `<br><span style="font-size:0.85em;opacity:0.55">${esc(r.course)}</span>` : ''}</span>
        <span class="rs ${scoreClass(r.score)}">${r.score != null ? r.score : 'NR'}</span>
      </div>`).join('')}
    </div>`;
  el.style.display = 'flex';
  document.getElementById('btn-close').onclick = () => el.style.display = 'none';
}

// ── Map ───────────────────────────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/liberty',
  projection: 'globe',
  center: [0, 20],
  zoom: 1.8,
  attributionControl: false
});

map.on('click', () => { document.getElementById('popup').style.display = 'none'; });

// ── Home city geocode & fly-to ──────────────────────────────────────────────
function flyToHome(lon, lat) {
  map.flyTo({ center: [lon, lat], zoom: 8, speed: 0.6, curve: 1.8, essential: true });
}

function geocodeAndFly(cityName) {
  fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(cityName)}`)
    .then(r => r.json())
    .then(data => {
      if (data.length > 0) {
        const lon = parseFloat(data[0].lon);
        const lat = parseFloat(data[0].lat);
        localStorage.setItem('golf_home_city', cityName);
        localStorage.setItem('golf_home_lon', String(lon));
        localStorage.setItem('golf_home_lat', String(lat));
        flyToHome(lon, lat);
      } else {
        flyToDefault();
      }
    })
    .catch(() => flyToDefault());
}

function flyToDefault() {
  if (locations.length > 0) {
    const avgLat = locations.reduce((s,d) => s + d.lat, 0) / locations.length;
    const avgLon = locations.reduce((s,d) => s + d.lng, 0) / locations.length;
    map.flyTo({ center: [avgLon, avgLat], zoom: 5, speed: 0.6, curve: 1.8, essential: true });
  }
}

map.on('load', () => {
  locations.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cmarker';
    el.style.background = d.color;
    el.style.color = d.color;
    el.title = d.name;
    el.addEventListener('click', e => { e.stopPropagation(); showPopup(d); });
    new maplibregl.Marker({ element: el, anchor: 'center' })
      .setLngLat([d.lng, d.lat])
      .addTo(map);
  });

  // Check for saved home city
  const savedCity = localStorage.getItem('golf_home_city');
  if (savedCity && savedCity !== '__skipped__') {
    const lon = parseFloat(localStorage.getItem('golf_home_lon'));
    const lat = parseFloat(localStorage.getItem('golf_home_lat'));
    if (!isNaN(lon) && !isNaN(lat)) {
      flyToHome(lon, lat);
    } else {
      geocodeAndFly(savedCity);
    }
  } else if (!savedCity) {
    openHomeCityModal(false);
  } else {
    flyToDefault();
  }
});

// ── Make elements draggable ───────────────────────────────────────────────
function makeDraggable(el, onClick) {
  let startX, startY, origLeft, origTop, dragged;

  function toPixelPos() {
    const rect = el.getBoundingClientRect();
    el.style.left = rect.left + 'px';
    el.style.top  = rect.top + 'px';
    el.style.right = 'auto';
    el.style.bottom = 'auto';
    el.style.transform = 'none';
  }

  el.addEventListener('mousedown', onDown);
  el.addEventListener('touchstart', onDown, { passive: false });

  function onDown(e) {
    const pt = e.touches ? e.touches[0] : e;
    startX = pt.clientX; startY = pt.clientY;
    const rect = el.getBoundingClientRect();
    origLeft = rect.left; origTop = rect.top;
    dragged = false;

    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('mouseup', onUp);
    document.addEventListener('touchend', onUp);
  }

  function onMove(e) {
    e.preventDefault();
    const pt = e.touches ? e.touches[0] : e;
    const dx = pt.clientX - startX;
    const dy = pt.clientY - startY;
    if (!dragged && Math.abs(dx) < 4 && Math.abs(dy) < 4) return;
    if (!dragged) {
      toPixelPos();
      el.classList.add('dragging');
      dragged = true;
    }
    el.style.left = (origLeft + dx) + 'px';
    el.style.top  = (origTop + dy) + 'px';
  }

  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchend', onUp);
    el.classList.remove('dragging');
    if (!dragged && onClick) onClick();
  }
}

makeDraggable(document.getElementById('counter'), () => {
  if (!passportBuilt) { buildPassport(); passportBuilt = true; }
  document.getElementById('passport').style.display = 'flex';
});
makeDraggable(document.getElementById('legend'));
</script>
