<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golf Passport</title>

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg-deep:    #060812;
  --bg-panel:   rgba(8,12,26,0.97);
  --bg-card:    rgba(255,255,255,0.035);
  --border:     rgba(255,255,255,0.07);
  --border-hi:  rgba(255,255,255,0.12);
  --accent:     #38bdf8;   /* Flighty sky-blue */
  --accent-dim: rgba(56,189,248,0.15);
  --green:      #34d399;
  --amber:      #fbbf24;
  --rose:       #f87171;
  --text-1:     #f1f5f9;
  --text-2:     #94a3b8;
  --text-3:     #475569;
  --font:       'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg-deep); overflow: hidden; font-family: var(--font); }
#map { width: 100vw; height: 100vh; }

/* ── MapLibre overrides ── */
.maplibregl-ctrl-bottom-right,
.maplibregl-ctrl-bottom-left { display: none; }
.maplibregl-ctrl-top-right .maplibregl-ctrl-zoom-in,
.maplibregl-ctrl-top-right .maplibregl-ctrl-zoom-out,
.maplibregl-ctrl-top-right .maplibregl-ctrl-compass {
  background-color: var(--bg-panel) !important;
  border-color: var(--border) !important;
}

/* ── Counter pill ── */
#counter {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
  background: var(--bg-panel);
  border: 1px solid var(--border);
  backdrop-filter: blur(20px);
  color: var(--text-2); padding: 10px 20px; border-radius: 40px;
  font-size: 0.78em; font-weight: 500; letter-spacing: 0.02em;
  z-index: 1000; cursor: pointer; user-select: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  display: flex; align-items: center; gap: 14px;
}
#counter:hover {
  border-color: rgba(56,189,248,0.35);
  box-shadow: 0 0 20px rgba(56,189,248,0.08);
}
#counter .sep { width: 1px; height: 14px; background: var(--border-hi); flex-shrink: 0; }
#counter .num { color: var(--text-1); font-weight: 700; }
#counter .cta { color: var(--accent); font-weight: 600; }

/* ── Legend ── */
#legend {
  position: fixed; bottom: 22px; right: 22px;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  backdrop-filter: blur(20px);
  padding: 10px 14px; border-radius: 12px;
  font-size: 0.72em; z-index: 1000; pointer-events: none; line-height: 1;
}
.leg { display: flex; align-items: center; gap: 8px; margin: 5px 0; color: var(--text-2); }
.leg-dot { width: 9px; height: 9px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.4); flex-shrink: 0; }

/* ── Shared panel styles ── */
.panel-close {
  background: none; border: none; color: var(--text-3); cursor: pointer;
  font-size: 0.85em; padding: 4px; line-height: 1; border-radius: 6px;
  transition: color 0.15s, background 0.15s;
}
.panel-close:hover { color: var(--text-1); background: rgba(255,255,255,0.06); }

/* ── Course popup ── */
#popup {
  position: fixed; top: 20px; right: 20px;
  width: 300px; max-height: calc(100vh - 40px);
  background: var(--bg-panel);
  border: 1px solid var(--border);
  backdrop-filter: blur(20px);
  border-radius: 16px; color: var(--text-1); z-index: 2000;
  display: none; flex-direction: column;
  box-shadow: 0 16px 48px rgba(0,0,0,0.6);
  overflow: hidden; animation: slideRight 0.18s ease;
}
@keyframes slideRight {
  from { opacity:0; transform: translateX(10px); }
  to   { opacity:1; transform: translateX(0); }
}
.ph {
  padding: 16px 16px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;
  flex-shrink: 0;
}
.ph-name { font-size: 0.88em; font-weight: 700; color: var(--text-1); line-height: 1.35; word-break: break-word; }
.ph-meta { font-size: 0.72em; color: var(--text-3); margin-top: 5px; font-weight: 500; }
.ph-avg  { font-weight: 700; }
.pr { overflow-y: auto; flex: 1; }
.pr::-webkit-scrollbar { width: 3px; }
.pr::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
.rr {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 16px; border-bottom: 1px solid rgba(255,255,255,0.03);
}
.rr:last-child { border-bottom: none; }
.rd { font-size: 0.75em; color: var(--text-3); font-weight: 500; }
.rs { font-size: 1.05em; font-weight: 800; font-variant-numeric: tabular-nums; }
.sg { color: var(--green); }
.sy { color: var(--amber); }
.sr { color: var(--rose); }

/* ── Passport panel ── */
#passport {
  position: fixed; top: 20px; left: 20px;
  width: 300px; max-height: calc(100vh - 40px);
  background: var(--bg-panel);
  border: 1px solid var(--border);
  backdrop-filter: blur(20px);
  border-radius: 16px; color: var(--text-1); z-index: 2001;
  display: none; flex-direction: column;
  box-shadow: 0 16px 48px rgba(0,0,0,0.65);
  overflow: hidden;
  animation: slideLeft 0.2s ease;
}
@keyframes slideLeft {
  from { opacity:0; transform: translateX(-10px); }
  to   { opacity:1; transform: translateX(0); }
}

.pp-header {
  padding: 18px 16px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: flex-start;
  flex-shrink: 0;
}
.pp-brand { display: flex; flex-direction: column; gap: 2px; }
.pp-title {
  font-size: 0.7em; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--accent);
}
.pp-name {
  font-size: 1.15em; font-weight: 800; color: var(--text-1);
  margin-top: 2px;
}
.pp-years {
  font-size: 0.68em; font-weight: 500; color: var(--text-3);
  letter-spacing: 0.06em; margin-top: 1px;
}

.pp-body { overflow-y: auto; flex: 1; padding: 0; }
.pp-body::-webkit-scrollbar { width: 3px; }
.pp-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

/* stat grid */
.stat-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1px; background: var(--border);
  border-bottom: 1px solid var(--border);
}
.stat-cell {
  background: var(--bg-panel);
  padding: 14px 16px;
}
.stat-num {
  font-size: 2em; font-weight: 900; font-variant-numeric: tabular-nums;
  color: var(--text-1); line-height: 1; letter-spacing: -0.02em;
}
.stat-label {
  font-size: 0.6em; font-weight: 600; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px;
}

/* detail rows */
.pp-details { padding: 4px 0; border-bottom: 1px solid var(--border); }
.pp-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 16px;
}
.pp-row-label { font-size: 0.72em; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; }
.pp-row-right { text-align: right; }
.pp-row-val { font-size: 0.92em; font-weight: 800; color: var(--text-1); font-variant-numeric: tabular-nums; }
.pp-row-sub { font-size: 0.62em; font-weight: 500; color: var(--text-3); margin-top: 1px; }

/* best round highlight */
.pp-best {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 14px;
}
.pp-best-score {
  font-size: 2.4em; font-weight: 900; line-height: 1;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
}
.pp-best-info { flex: 1; }
.pp-best-label { font-size: 0.6em; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.1em; }
.pp-best-course { font-size: 0.78em; font-weight: 600; color: var(--text-2); margin-top: 3px; }
.pp-best-date { font-size: 0.65em; font-weight: 500; color: var(--text-3); margin-top: 1px; }

/* sections */
.pp-section-header {
  font-size: 0.6em; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text-3);
  padding: 12px 16px 6px;
}
.pp-badge-row {
  display: flex; flex-wrap: wrap; gap: 5px;
  padding: 0 16px 14px;
}

.badge {
  font-size: 0.65em; font-weight: 700; letter-spacing: 0.04em;
  padding: 4px 9px; border-radius: 6px;
  border: 1px solid; cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
}
.badge:hover { transform: scale(1.08); }
.badge-us {
  background: rgba(56,189,248,0.08); color: var(--accent);
  border-color: rgba(56,189,248,0.18);
}
.badge-us:hover, .badge-us.active {
  background: rgba(56,189,248,0.2); border-color: rgba(56,189,248,0.45);
}
.badge-intl {
  background: rgba(251,191,36,0.08); color: var(--amber);
  border-color: rgba(251,191,36,0.18);
}
.badge-intl:hover, .badge-intl.active {
  background: rgba(251,191,36,0.2); border-color: rgba(251,191,36,0.45);
}

/* region course list (inside popup) */
.region-course {
  padding: 10px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  transition: background 0.12s;
}
.region-course:last-child { border-bottom: none; }
.region-course:hover { background: rgba(255,255,255,0.04); }
.rc-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.rc-name { font-size: 0.8em; font-weight: 700; color: var(--text-1); line-height: 1.3; }
.rc-avg { font-size: 0.9em; font-weight: 800; font-variant-numeric: tabular-nums; flex-shrink: 0; }
.rc-meta { font-size: 0.66em; font-weight: 500; color: var(--text-3); margin-top: 3px; }
.rc-scores { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
.rc-score {
  font-size: 0.62em; font-weight: 700; padding: 2px 5px;
  border-radius: 4px; background: rgba(255,255,255,0.04);
  font-variant-numeric: tabular-nums;
}

/* ── Course markers ── */
.cmarker {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.85);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.5);
  cursor: pointer;
  transition: transform 0.12s, box-shadow 0.12s;
}
.cmarker:hover {
  transform: scale(1.6);
  box-shadow: 0 0 0 2px rgba(255,255,255,0.6), 0 4px 14px rgba(0,0,0,0.6);
}
</style>
</head>
<body>

<div id="map"></div>

<div id="counter" title="View your Golf Passport">
  <span><span class="num" id="n-rounds">—</span> rounds</span>
  <span class="sep"></span>
  <span><span class="num" id="n-courses">—</span> courses</span>
  <span class="sep"></span>
  <span class="cta">Passport</span>
</div>

<div id="legend">
  <div class="leg"><div class="leg-dot" style="background:var(--green)"></div>Avg &lt; 80</div>
  <div class="leg"><div class="leg-dot" style="background:var(--amber)"></div>Avg 80 – 89</div>
  <div class="leg"><div class="leg-dot" style="background:var(--rose)"></div>Avg 90+</div>
</div>

<div id="popup"></div>

<div id="passport">
  <div class="pp-header">
    <div class="pp-brand">
      <div class="pp-title">Golf Passport</div>
      <div class="pp-name" id="pp-name">Matt Pulos</div>
      <div class="pp-years" id="pp-years">2008 – 2025</div>
    </div>
    <button class="panel-close" id="pp-close">✕</button>
  </div>
  <div class="pp-body">
    <div class="stat-grid">
      <div class="stat-cell"><div class="stat-num" id="pp-rounds">—</div><div class="stat-label">Rounds</div></div>
      <div class="stat-cell"><div class="stat-num" id="pp-courses">—</div><div class="stat-label">Courses</div></div>
      <div class="stat-cell"><div class="stat-num" id="pp-states">—</div><div class="stat-label">States</div></div>
      <div class="stat-cell"><div class="stat-num" id="pp-countries">—</div><div class="stat-label">Countries</div></div>
    </div>

    <div class="pp-best" id="pp-best"></div>

    <div class="pp-details" id="pp-details"></div>

    <div class="pp-section-header">States Played</div>
    <div class="pp-badge-row" id="pp-state-badges"></div>

    <div class="pp-section-header">Countries Played</div>
    <div class="pp-badge-row" id="pp-country-badges"></div>
  </div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="data.js"></script>
<script>
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(s) { const p = s.split('/'); return `${MONTHS[+p[0]-1]} ${p[2]||p[1]}`; }
function fmtYear(s) { const p = s.split('/'); return +(p[2]||p[1]); }
function pinColor(avg) { return avg < 80 ? '#34d399' : avg < 90 ? '#fbbf24' : '#f87171'; }
function scoreClass(s) { return s < 80 ? 'sg' : s < 90 ? 'sy' : 'sr'; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Region inference from lat/lon ─────────────────────────────────────────────
function inferRegion(lat, lon) {
  if (lat > 54)                                        return { country: 'Scotland',  state: null };
  if (lat > 49)                                        return { country: 'England',   state: null };
  if (lat < 23 && lon < -150)                          return { country: 'USA', state: 'HI' };
  if (lon < -115)                                      return { country: 'USA', state: 'CA' };
  if (lon < -109 && lat < 37)                          return { country: 'USA', state: 'AZ' };
  if (lat < 28)                                        return { country: 'USA', state: 'FL' };
  if (lat < 33.5 && lon < -78)                         return { country: 'USA', state: 'SC' };
  if (lat < 37 && lon > -84)                           return { country: 'USA', state: 'NC' };
  if (lat < 39.5 && lon > -75.8 && lon < -74.8)       return { country: 'USA', state: 'DE' };
  if (lat > 40 && lon > -74.15)                        return { country: 'USA', state: 'NY' };
  if (lat > 41.3 && lon > -75.2)                       return { country: 'USA', state: 'NY' };
  if (lon > -74.97)                                    return { country: 'USA', state: 'NJ' };
  return { country: 'USA', state: 'PA' };
}

const STATE_LABELS = {
  PA:'Pennsylvania', NJ:'New Jersey', NY:'New York', DE:'Delaware',
  NC:'N. Carolina', SC:'S. Carolina', FL:'Florida',
  CA:'California', HI:'Hawaii', AZ:'Arizona'
};
const STATE_ORDER = ['PA','DE','NJ','NY','NC','SC','FL','AZ','CA','HI'];

// ── Aggregate by course ───────────────────────────────────────────────────────
const raw = window.GOLF_DATA || [];
const byCoord = {};
raw.forEach(r => {
  if (r.course_name === 'Other' || r.lat === null) return;
  const key = `${r.lat},${r.lon}`;
  if (!byCoord[key]) byCoord[key] = { name: r.course_name, lat: r.lat, lng: r.lon, rounds: [] };
  byCoord[key].rounds.push({ date: r.date, score: r.score, course: r.course_name });
});

const locations = Object.values(byCoord).map(d => {
  d.rounds.sort((a,b) => {
    const pa = a.date.split('/'), pb = b.date.split('/');
    const ya = +(pa[2]||pa[1]), yb = +(pb[2]||pb[1]);
    return ya !== yb ? yb-ya : +pb[0]-+pa[0];
  });
  d.avg = d.rounds.reduce((s,r) => s+r.score, 0) / d.rounds.length;
  d.color = pinColor(d.avg);
  return d;
});

const validRounds = raw.filter(r => r.course_name !== 'Other' && r.lat !== null);
document.getElementById('n-rounds').textContent  = validRounds.length;
document.getElementById('n-courses').textContent = locations.length;

// ── Tag each location with its region ─────────────────────────────────────────
const stateSet   = new Set();
const countrySet = new Set();
locations.forEach(d => {
  const reg = inferRegion(d.lat, d.lng);
  d.region = reg;
  if (reg.state) stateSet.add(reg.state);
  countrySet.add(reg.country);
});

const bestRound  = validRounds.reduce((b, r) => r.score < b.score ? r : b);
const avgScore   = (validRounds.reduce((s,r) => s+r.score, 0) / validRounds.length).toFixed(1);
const mostPlayed = locations.reduce((a,b) => a.rounds.length > b.rounds.length ? a : b);
const allYears   = validRounds.map(r => fmtYear(r.date));
const firstYear  = Math.min(...allYears);
const lastYear   = Math.max(...allYears);

function buildPassport() {
  document.getElementById('pp-rounds').textContent    = validRounds.length;
  document.getElementById('pp-courses').textContent   = locations.length;
  document.getElementById('pp-states').textContent    = stateSet.size;
  document.getElementById('pp-countries').textContent = countrySet.size;
  document.getElementById('pp-years').textContent     = `${firstYear} – ${lastYear}`;

  // Best round highlight
  const bestColor = bestRound.score < 80 ? 'var(--green)' : bestRound.score < 90 ? 'var(--amber)' : 'var(--rose)';
  document.getElementById('pp-best').innerHTML = `
    <div class="pp-best-score" style="color:${bestColor}">${bestRound.score}</div>
    <div class="pp-best-info">
      <div class="pp-best-label">Best Round</div>
      <div class="pp-best-course">${esc(bestRound.course_name)}</div>
      <div class="pp-best-date">${fmtDate(bestRound.date)}</div>
    </div>`;

  // Detail rows
  document.getElementById('pp-details').innerHTML = `
    <div class="pp-row">
      <span class="pp-row-label">Scoring Avg</span>
      <div class="pp-row-right">
        <div class="pp-row-val">${avgScore}</div>
      </div>
    </div>
    <div class="pp-row">
      <span class="pp-row-label">Most Played</span>
      <div class="pp-row-right">
        <div class="pp-row-val">${mostPlayed.rounds.length} rounds</div>
        <div class="pp-row-sub">${esc(mostPlayed.name)}</div>
      </div>
    </div>`;

  // State badges (clickable)
  const orderedStates = STATE_ORDER.filter(s => stateSet.has(s));
  const extraStates   = [...stateSet].filter(s => !STATE_ORDER.includes(s)).sort();
  const stBadgeEl = document.getElementById('pp-state-badges');
  stBadgeEl.innerHTML =
    [...orderedStates, ...extraStates].map(s =>
      `<span class="badge badge-us" data-region-type="state" data-region-key="${s}" title="${STATE_LABELS[s] || s}">${s}</span>`
    ).join('');
  stBadgeEl.querySelectorAll('.badge').forEach(b =>
    b.addEventListener('click', () => showRegionPopup('state', b.dataset.regionKey))
  );

  // Country badges (clickable)
  const countryOrder = ['USA', 'England', 'Scotland'];
  const orderedCountries = countryOrder.filter(c => countrySet.has(c));
  const extraCountries   = [...countrySet].filter(c => !countryOrder.includes(c)).sort();
  const ctBadgeEl = document.getElementById('pp-country-badges');
  ctBadgeEl.innerHTML =
    [...orderedCountries, ...extraCountries].map(c =>
      `<span class="badge ${c === 'USA' ? 'badge-us' : 'badge-intl'}" data-region-type="country" data-region-key="${c}">${c}</span>`
    ).join('');
  ctBadgeEl.querySelectorAll('.badge').forEach(b =>
    b.addEventListener('click', () => showRegionPopup('country', b.dataset.regionKey))
  );
}

// ── Passport toggle ───────────────────────────────────────────────────────────
let passportBuilt = false;
document.getElementById('counter').addEventListener('click', () => {
  if (!passportBuilt) { buildPassport(); passportBuilt = true; }
  document.getElementById('passport').style.display = 'flex';
});
document.getElementById('pp-close').addEventListener('click', () => {
  document.getElementById('passport').style.display = 'none';
});

// ── Region popup (state / country drill-down) ────────────────────────────────
function showRegionPopup(type, key) {
  const el = document.getElementById('popup');
  const filtered = locations.filter(d =>
    type === 'state' ? d.region.state === key : d.region.country === key
  ).sort((a,b) => b.rounds.length - a.rounds.length);

  const label = type === 'state' ? (STATE_LABELS[key] || key) : key;
  const totalRounds = filtered.reduce((s,d) => s + d.rounds.length, 0);

  el.innerHTML = `
    <div class="ph">
      <div style="min-width:0">
        <div class="ph-name">${esc(label)}</div>
        <div class="ph-meta">${filtered.length} course${filtered.length!==1?'s':''} &nbsp;·&nbsp; ${totalRounds} round${totalRounds!==1?'s':''}</div>
      </div>
      <button class="panel-close" id="btn-close">✕</button>
    </div>
    <div class="pr">
      ${filtered.map((d, i) => {
        const avgColor = d.avg < 80 ? 'var(--green)' : d.avg < 90 ? 'var(--amber)' : 'var(--rose)';
        return `<div class="region-course" data-loc-idx="${i}">
          <div class="rc-top">
            <span class="rc-name">${esc(d.name)}</span>
            <span class="rc-avg" style="color:${avgColor}">${d.avg.toFixed(1)}</span>
          </div>
          <div class="rc-meta">${d.rounds.length} round${d.rounds.length!==1?'s':''}</div>
          <div class="rc-scores">${d.rounds.map(r =>
            `<span class="rc-score ${scoreClass(r.score)}">${r.score}</span>`
          ).join('')}</div>
        </div>`;
      }).join('')}
    </div>`;

  el.style.display = 'flex';
  document.getElementById('btn-close').onclick = () => el.style.display = 'none';

  // Click a course row to drill into the full course detail
  el.querySelectorAll('.region-course').forEach(row => {
    row.addEventListener('click', () => {
      const idx = +row.dataset.locIdx;
      showPopup(filtered[idx]);
    });
  });
}

// ── Course popup ──────────────────────────────────────────────────────────────
function showPopup(d) {
  const el = document.getElementById('popup');
  const dot = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${d.color};margin-right:6px;vertical-align:middle"></span>`;
  el.innerHTML = `
    <div class="ph">
      <div style="min-width:0">
        <div class="ph-name">${dot}${esc(d.name)}</div>
        <div class="ph-meta">${d.rounds.length} round${d.rounds.length!==1?'s':''} &nbsp;·&nbsp; <span class="ph-avg" style="color:${d.color}">Avg ${d.avg.toFixed(1)}</span></div>
      </div>
      <button class="panel-close" id="btn-close">✕</button>
    </div>
    <div class="pr">${d.rounds.map(r=>`
      <div class="rr">
        <span class="rd">${fmtDate(r.date)}${r.course !== d.name ? `<br><span style="font-size:0.85em;opacity:0.55">${esc(r.course)}</span>` : ''}</span>
        <span class="rs ${scoreClass(r.score)}">${r.score}</span>
      </div>`).join('')}
    </div>`;
  el.style.display = 'flex';
  document.getElementById('btn-close').onclick = () => el.style.display = 'none';
}

// ── Map ───────────────────────────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/liberty',
  projection: 'globe',
  center: [-78, 38],
  zoom: 3,
  attributionControl: false
});

map.on('click', () => { document.getElementById('popup').style.display = 'none'; });

// ── Auto-rotate ───────────────────────────────────────────────────────────────
let spinning = true;
let spinId;
function spinGlobe() {
  if (!spinning) return;
  const c = map.getCenter();
  map.setCenter([c.lng - 0.06, c.lat]);
  spinId = requestAnimationFrame(spinGlobe);
}

map.on('load', () => {
  spinGlobe();
  locations.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cmarker';
    el.style.background = d.color;
    el.title = d.name;
    el.addEventListener('click', e => { e.stopPropagation(); showPopup(d); });
    new maplibregl.Marker({ element: el, anchor: 'center' })
      .setLngLat([d.lng, d.lat])
      .addTo(map);
  });
});

['mousedown','touchstart','wheel'].forEach(evt => {
  map.getCanvas().addEventListener(evt, () => {
    spinning = false;
    cancelAnimationFrame(spinId);
  }, { once: true, passive: true });
});
</script>
